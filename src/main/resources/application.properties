spring.application.name=LibraryManagementSystem

spring.datasource.url=jdbc:mysql://gondola.proxy.rlwy.net:32529/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}

spring.mvc.view.suffix=.jsp

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5